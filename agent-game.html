<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>VALORANT エージェント当てゲーム</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css?v=4">
</head>
<body>
  <div id="app">

    <header class="header">
      <div class="header-left">
        <h1 class="title">
          <span class="title-valo">VALORANT</span>
          <span class="title-sub">エージェント当てゲーム</span>
        </h1>
      </div>
      <div class="header-right">
        <div id="counter" class="counter">残り <span id="count-num">--</span> / <span id="count-total">--</span></div>
        <button id="reset-btn" class="btn-reset">リセット</button>
      </div>
    </header>

    <nav class="role-filter" id="role-filter">
      <button class="filter-btn active" data-role="all">すべて</button>
      <button class="filter-btn" data-role="Duelist">⚔️ デュエリスト</button>
      <button class="filter-btn" data-role="Sentinel">🛡️ センチネル</button>
      <button class="filter-btn" data-role="Controller">🌫️ コントローラー</button>
      <button class="filter-btn" data-role="Initiator">🔍 イニシエーター</button>
    </nav>

    <main id="grid" class="agent-grid">
      <div class="loading" id="loading">
        <div class="spinner"></div>
        <p>エージェントデータを読み込み中…</p>
      </div>
    </main>

  </div>

  <script src="app.js?v=4"></script>
</body>
</html>
